<section id="team-download-division" class="section">

        data-zh="会见我们的领导团队"></h2>

    <div class="team-container" style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
        <div class="member-card">
            <img src="images/nathanael.png" alt="Nathanael" class="member-photo">
            <h3 class="member-name">Nathanael Njalika</h3>
            <span class="member-position">
                <span data-en="Founder & Chief Consultant" data-zh="创始人兼首席顾问"></span>

                <span data-en="Leads the strategic vision of Zhongtan Dazi, specializing in bridging international business relations and Tanzanian market expansion through expert and professional consultancy."

        <div class="member-card">

                <span data-en="Managing Director & Tax Associate" data-zh="财务与税务总监"></span>
            </span>

                <span data-en="Oversees the financial integrity and tax compliance frameworks for our clients, ensuring all operations align with Tanzanian regulatory standards."

            </p>

<section class="section dark">
  <div class="container">
    <div class="form-box">
      <h3 style="text-align: center;" data-en="Fill the form below" data-zh="请填写以下表格"></h3>
      
      <form action="https://formspree.io/f/mgopzdqa" method="POST">
        <input type="text" name="name" placeholder="Name / 姓名" required>
        <input type="email" name="email" placeholder="Email / 邮箱" required>
        
        <select name="service" required>
          <option value="" disabled selected data-en="Consulting For" data-zh="咨询服务类型"></option>
          <option data-en="Company Registration" data-zh="公司注册"></option>
          <option data-en="Legal Services" data-zh="法律服务"></option>
          <option data-en="Tax and Auditing" data-zh="税务与审计"></option>
          <option data-en="Investment Guidance" data-zh="投资指导"></option>
          <option data-en="Other" data-zh="其他"></option>
        </select>

        <select name="location" required>
          <option value="" disabled selected data-en="Select Location" data-zh="选择城市"></option>
          <option data-en="Dar es Salaam" data-zh="达累斯萨拉姆"></option>
          <option data-en="Arusha" data-zh="阿鲁沙"></option>
          <option data-en="Mbeya" data-zh="姆贝亚"></option>
          <option data-en="Dodoma" data-zh="多多马"></option>
          <option data-en="Mwanza" data-zh="姆万扎"></option>
          <option data-en="Other City" data-zh="其他城市"></option>
        </select>

        <textarea name="message" placeholder="请详细说明您的需求"></textarea>
        <button type="submit" class="btn" style="width: 100%;" data-en="Submit" data-zh="提交"></button>
      </form>

      <div class="agree-box" style="margin-top: 15px;">
        <input type="checkbox" checked disabled>
        <span data-en="By submitting this form I agree to the terms and conditions." 
              data-zh="提交此表格即表示我同意相关条款与条件。"></span>
      </div>
    </div>
  </div>
</section>

    <div class="container">
        <div class="downloads-box">
            <h3 class="downloads-title" data-en="Downloadables" data-zh="资源与文档"></h3>
