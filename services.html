<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中坦达资 | SERVICES</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  
  <style>
    /* 1. RESTORE NORMAL SCROLLING */
    body.services-page {
        overflow-y: auto !important; /* Allow natural scrolling */
        overflow-x: hidden;
        background: var(--navy);
    }

    /* Remove the 'Frame' constraints that were causing the split/blank screen issues */
    .page-frame {
        width: 100%;
        position: relative;
    }

    /* 2. SECTION SPACING */
    .section {
        padding: 80px 0;
        min-height: auto; /* Sections take only the space they need */
    }

    .intro-text {
        text-align: center;
        max-width: 800px;
        margin: 0 auto 40px auto;
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--paleblue);
    }

    .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 30px;
        padding-top: 20px;
        margin-top: 10px;
    }

    .services-grid .card {
        min-height: 340px;
        padding: 36px;
        background: linear-gradient(180deg, rgba(18,58,111,0.95), rgba(11,30,60,0.90));
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
        transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .services-grid .card:hover {
        transform: translateY(-8px);
        border-color: rgba(230,240,255,0.4);
    }

    /* Combined Section Styles */
    .combined-section {
        background: linear-gradient(180deg, rgba(11,30,60,0.96), rgba(18,58,111,0.98));
        padding: 100px 0;
    }

    .combined-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        max-width: 1200px;
        margin: auto;
    }

    .why-choose-us {
        padding: 35px;
        background: var(--navy);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.12);
    }

    .why-list { list-style: none; padding: 0; }
    .why-list li {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        padding: 15px;
        background: rgba(255,255,255,0.03);
        border-radius: 12px;
        border-left: 4px solid var(--paleblue);
    }

    .testimonial-card {
        background: var(--navy);
        border-radius: 20px;
        padding: 30px;
        border: 1px solid rgba(255,255,255,0.12);
        margin-bottom: 40px;
    }

    .partners-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-top: 30px;
    }

    .partners-grid { display: flex; gap: 20px; }
    .partner-card img { width: 60px; height: auto; opacity: 0.8; }

    @media (max-width: 900px) {
        .combined-container { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body class="services-page">

<header class="header">
  <div class="container flex">
    <div class="logo">
        <img src="images/logo.png" alt="中坦达资logo">
        <h2 data-en="中坦达资" data-zh="中坦达资">中坦达资</h2>
    </div>
    <nav>
      <a href="index.html" data-en="Home" data-zh="首页"></a>
      <a href="services.html" class="active" data-en="Services" data-zh="服务"></a>
      <a href="tanzania.html" data-en="Tanzania" data-zh="坦桑尼亚"></a>
      <a href="contact.html" data-en="Contact Us" data-zh="联系我们"></a>
      <button id="langToggle">中文</button>
    </nav>
     <button id="hamburger">☰</button>
  </div>
</header>

<main class="page-frame">

    <section id="what-we-do" class="section">
      <div class="container">
        <h1 style="text-align: center; font-size: 3rem; margin-bottom: 20px;" 
            data-en="WHAT WE DO!" 
            data-zh="我们的业务!"></h1>

        <div class="intro-text">
            <p data-en="中坦达资 provides a professional bridge for businesses and individuals navigating the Tanzanian market. We specialize in simplifying complex administrative and legal hurdles, ensuring our clients can focus on growth while we handle the local compliance and strategic planning." 
               data-zh="中坦达资为在坦桑尼亚市场发展的企业和个人提供专业的桥梁服务。我们专注于简化复杂的行政和法律障碍，确保我们的客户能够专注于业务增长，而由我们负责处理当地的合规和战略规划。"></p>
        </div>

        <div class="grid services-grid">
          <div class="card">
            <h3 data-en="Company Registration" data-zh="公司注册"></h3>
            <p data-en="We assist both individuals and companies with fast, compliant company registration in Tanzania. Whether urgent or standard cases, we ensure proper setup without errors."
               data-zh="我们为个人和企业提供快速且合规的公司注册服务，无论紧急或常规需求，确保注册过程准确无误。"></p>
          </div>
          <div class="card">
            <h3 data-en="Legal Services" data-zh="法律服务"></h3>
            <p data-en="We provide legal support for contracts, disputes, and compliance. We are a private firm, not part of the government, but we work closely with official institutions to ensure correct procedures."
               data-zh="我们提供合同、纠纷及合规方面的法律支持。我们是私人机构，不隶属于政府，但与相关部门保持合作以确保流程合规。"></p>
          </div>
          <div class="card">
            <h3 data-en="Tax & Auditing" data-zh="税务与审计"></h3>
            <p data-en="We handle tax planning, filing, and auditing for individuals and companies. Our approach ensures accuracy, compliance, and protection from unnecessary penalties."
               data-zh="我们为个人和企业提供税务规划、申报及审计服务，确保准确合规并避免不必要的处罚。"></p>
          </div>
          <div class="card">
            <h3 data-en="Investment Guidance" data-zh="投资指导"></h3>
            <p data-en="We guide foreign clients through Tanzania investment laws, procedures, and risks. We provide clear information so you can make safe and informed decisions."
               data-zh="我们为外国客户提供坦桑尼亚投资法律、流程及风险方面的指导，帮助您做出安全且明智的决策。"></p>
          </div>
        </div>
      </div>
    </section>

    <section id="why-choose-us" class="section combined-section">
        <div class="container combined-container">
            <div class="why-choose-us">
                <h2 data-en="Why Choose Us" data-zh="为什么选择我们">Why Choose Us</h2>
                <ul class="why-list">
                    <li data-en="Local Tanzanian experts" data-zh="本地坦桑尼亚专业团队">Local Tanzanian experts</li>
                    <li data-en="Chinese-speaking support" data-zh="提供中文沟通支持">Chinese-speaking support</li>
                    <li data-en="Fast response for urgent cases" data-zh="紧急情况快速响应">Fast response for urgent cases</li>
                    <li data-en="Deep understanding of local laws" data-zh="深入了解当地法律法规">Deep understanding of local laws</li>
                </ul>
            </div>

            <div class="testimonials-column">
                <div class="testimonial-card">
                    <div class="testimonial-stars">★★★★★</div>
                    <p class="testimonial-text">"中坦达资服务非常专业，我们公司注册很顺利完成，效率很高。以后一定继续合作。"</p>
                    <hr style="width: 70%; margin: 10px auto;">
                    <div class="testimonial-author">
                        <span class="testimonial-name">张伟</span>
                    </div>
                </div>

                <div class="partners-container">
                    <h2 data-en="Our Partner Companies" data-zh="我们的合作伙伴">Our Partner Companies</h2>
                    <div class="partners-row">
                        <div class="partners-grid">
                          <div class="partner-card"><img src="../../images/logo.png" alt="Logo"></div>
                          <div class="partner-card"><img src="../../images/chanivisitz-transparent.png" alt="Logo"></div>
                          <div class="partner-card"><img src="../../images/sasa-transparent.png" alt="Logo"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>
